<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NXRD · Briskfil Dashboard</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050507;
    --surface: #0d0e12;
    --lime: #c8f026;
    --lime-glow: rgba(200, 240, 38, 0.5);
    --text: #ffffff;
    --muted: #71717a;
    --muted2: #a1a1aa;
    --border: rgba(255, 255, 255, 0.08);
    --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: default;
  }

  /* === LAYERED ANIMATED BACKGROUND === */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(200,240,38,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,38,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }
  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(80px);
    pointer-events: none; z-index: 0;
  }
  .bg-orb.one { width: 480px; height: 480px; background: rgba(200,240,38,0.16); top: -120px; left: -120px; animation: float1 18s ease-in-out infinite; }
  .bg-orb.two { width: 360px; height: 360px; background: rgba(96,165,250,0.10); bottom: -80px; right: -80px; animation: float2 22s ease-in-out infinite; }
  .bg-orb.three { width: 280px; height: 280px; background: rgba(167,139,250,0.08); top: 60%; left: 30%; animation: float3 26s ease-in-out infinite; }
  @keyframes float1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(80px, 60px) scale(1.1); } }
  @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-60px, -80px) scale(1.15); } }
  @keyframes float3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-40px, 40px) scale(0.9); } }

  /* Floating particles */
  .particle {
    position: fixed; width: 3px; height: 3px; background: var(--lime);
    border-radius: 50%; box-shadow: 0 0 8px var(--lime);
    pointer-events: none; z-index: 1; opacity: 0;
  }

  /* === CENTRAL CARD === */
  .auth-shell {
    position: relative; z-index: 10;
    width: 100%; max-width: 480px;
    padding: 0 24px;
    animation: cardRise 1s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes cardRise { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

  /* === NXRD LOGO LOCKUP === */
  .logo-stack { text-align: center; margin-bottom: 36px; }
  .logo-mark {
    position: relative; display: inline-block; width: 110px; height: 110px;
    margin-bottom: 22px;
  }
  .logo-mark svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .logo-ring {
    fill: none; stroke: var(--lime); stroke-width: 1.5;
    stroke-dasharray: 360; stroke-dashoffset: 360;
    animation: ringDraw 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    filter: drop-shadow(0 0 12px var(--lime-glow));
  }
  .logo-ring-inner {
    fill: none; stroke: var(--lime); stroke-width: 0.8; opacity: 0;
    animation: ringFade 0.8s ease 1.2s forwards;
  }
  .logo-tick {
    fill: var(--lime);
    transform-origin: 55px 55px;
    transform: scale(0);
    animation: tickPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 1.0s forwards;
    filter: drop-shadow(0 0 6px var(--lime-glow));
  }
  .logo-pulse {
    fill: none; stroke: var(--lime); stroke-width: 1;
    transform-origin: 55px 55px;
    opacity: 0;
    animation: pulse 3s ease-in-out 2s infinite;
  }
  @keyframes ringDraw { to { stroke-dashoffset: 0; } }
  @keyframes ringFade { to { opacity: 0.4; } }
  @keyframes tickPop { 0% { transform: scale(0) rotate(-30deg); } 100% { transform: scale(1) rotate(0); } }
  @keyframes pulse {
    0%   { opacity: 0; transform: scale(1); }
    40%  { opacity: 0.6; }
    100% { opacity: 0; transform: scale(1.6); }
  }
  .logo-wordmark {
    display: block;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 0.18em;
    color: var(--text);
    margin-left: 0.18em; /* compensate for tracking */
    opacity: 0;
    animation: wordFade 0.8s ease 1.4s forwards;
  }
  .logo-wordmark .accent { color: var(--lime); text-shadow: 0 0 16px var(--lime-glow); }
  .logo-tagline {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.4em;
    margin-top: 8px;
    margin-left: 0.4em;
    opacity: 0;
    animation: wordFade 0.8s ease 1.7s forwards;
  }
  @keyframes wordFade { to { opacity: 1; } }

  /* === LOGIN CARD === */
  .auth-card {
    background: linear-gradient(145deg, rgba(20,21,26,0.95), rgba(13,14,18,0.95));
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 38px 36px 32px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
      0 30px 60px rgba(0,0,0,0.5),
      0 0 0 1px rgba(200,240,38,0.05),
      inset 0 1px 0 rgba(255,255,255,0.05);
    opacity: 0;
    animation: wordFade 0.8s ease 0.6s forwards;
  }

  .auth-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.2; }
  .auth-subtitle { font-size: 13px; color: var(--muted2); margin-bottom: 26px; line-height: 1.55; }

  .field-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; display: block; }
  .field-wrap { position: relative; margin-bottom: 18px; }
  .field-input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 50px 14px 16px;
    outline: none;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .field-input::placeholder { color: var(--muted); font-weight: 400; letter-spacing: 0; }
  .field-input:focus {
    border-color: var(--lime);
    background: rgba(200,240,38,0.04);
    box-shadow: 0 0 0 4px rgba(200,240,38,0.10);
  }
  .field-toggle {
    position: absolute; top: 50%; right: 12px; transform: translateY(-50%);
    background: transparent; border: none; color: var(--muted2); cursor: pointer;
    font-size: 12px; padding: 6px 10px; border-radius: 6px;
    font-family: 'Poppins', sans-serif; font-weight: 600;
    transition: color 0.15s;
  }
  .field-toggle:hover { color: var(--lime); }

  .auth-submit {
    width: 100%;
    background: var(--lime);
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 14px 18px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }
  .auth-submit:hover { background: #b8e020; transform: translateY(-1px); box-shadow: 0 8px 22px rgba(200,240,38,0.3); }
  .auth-submit:active { transform: translateY(0); }
  .auth-submit:disabled { opacity: 0.7; cursor: wait; }
  .auth-submit .spin {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.25); border-top-color: #000;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-right: 8px; vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .auth-error {
    margin-top: 14px; padding: 11px 14px;
    background: rgba(248,113,113,0.10);
    border: 1px solid rgba(248,113,113,0.30);
    border-radius: 10px;
    font-size: 12.5px; color: var(--red);
    display: none;
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .auth-error.show { display: block; }

  /* === FOOTER === */
  .auth-footer {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: var(--muted);
    opacity: 0;
    animation: wordFade 0.8s ease 2s forwards;
  }
  .auth-footer a { color: var(--lime); text-decoration: none; font-weight: 600; }
  .auth-footer .sep { margin: 0 8px; opacity: 0.4; }

  @media (max-width: 520px) {
    .auth-card { padding: 32px 24px 26px; border-radius: 18px; }
    .logo-mark { width: 86px; height: 86px; margin-bottom: 18px; }
    .logo-wordmark { font-size: 30px; }
    .auth-title { font-size: 19px; }
  }
</style>
</head>
<body>

  <!-- LAYERED BACKGROUND -->
  <div class="bg-grid"></div>
  <div class="bg-orb one"></div>
  <div class="bg-orb two"></div>
  <div class="bg-orb three"></div>

  <!-- AUTH SHELL -->
  <div class="auth-shell">

    <!-- ANIMATED NXRD LOGO -->
    <div class="logo-stack">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer pulsing rings (decorative) -->
          <circle class="logo-pulse" cx="55" cy="55" r="40" style="animation-delay:2s;"/>
          <circle class="logo-pulse" cx="55" cy="55" r="40" style="animation-delay:3.5s;"/>

          <!-- Inner dotted ring -->
          <circle class="logo-ring-inner" cx="55" cy="55" r="44" stroke-dasharray="2 4"/>

          <!-- Main ring drawing on -->
          <circle class="logo-ring" cx="55" cy="55" r="38"/>

          <!-- N glyph stylised as an N with a forward stroke -->
          <g class="logo-tick">
            <path d="M 40 70 L 40 40 L 70 70 L 70 40" stroke="#c8f026" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </g>
        </svg>
      </div>
      <div>
        <span class="logo-wordmark">N<span class="accent">X</span>RD</span>
        <div class="logo-tagline">AI Marketing Tool</div>
      </div>
    </div>

    <!-- LOGIN CARD -->
    <div class="auth-card">
      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">Enter the dashboard password to access the Briskfil marketing tool.</div>

      <form id="auth-form" autocomplete="off">
        <label class="field-label" for="password">Password</label>
        <div class="field-wrap">
          <input
            id="password"
            name="password"
            type="password"
            class="field-input"
            placeholder="Enter password"
            autocomplete="current-password"
            required
            autofocus
          >
          <button type="button" class="field-toggle" id="pw-toggle" aria-label="Show password">Show</button>
        </div>

        <button type="submit" class="auth-submit" id="submit-btn">
          <span id="submit-text">Unlock dashboard</span>
        </button>

        <div class="auth-error" id="err-box"></div>
      </form>
    </div>

    <div class="auth-footer">
      Powered by <a href="https://nx-rd.com" target="_blank">NXRD</a>
      <span class="sep">·</span>
      Briskfil AI Marketing Tool
    </div>
  </div>

  <script>
    // === Light particle effect — a few drifting dots ===
    (function spawnParticles() {
      const count = 12;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const left = Math.random() * 100;
        const delay = Math.random() * 8;
        const duration = 10 + Math.random() * 14;
        const size = 2 + Math.random() * 3;
        p.style.left = left + 'vw';
        p.style.top = '100vh';
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.opacity = (0.4 + Math.random() * 0.4).toFixed(2);
        p.style.animation = `partRise ${duration}s linear ${delay}s infinite`;
        document.body.appendChild(p);
      }
      const style = document.createElement('style');
      style.textContent = '@keyframes partRise { from { transform: translateY(0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.4; } to { transform: translateY(-120vh); opacity: 0; } }';
      document.head.appendChild(style);
    })();

    // === Password show/hide toggle ===
    const pwInput = document.getElementById('password');
    const pwToggle = document.getElementById('pw-toggle');
    pwToggle.addEventListener('click', () => {
      const isPassword = pwInput.type === 'password';
      pwInput.type = isPassword ? 'text' : 'password';
      pwToggle.textContent = isPassword ? 'Hide' : 'Show';
      pwInput.focus();
    });

    // === Form submit ===
    const form = document.getElementById('auth-form');
    const submitBtn = document.getElementById('submit-btn');
    const submitText = document.getElementById('submit-text');
    const errBox = document.getElementById('err-box');

    function showError(msg) {
      errBox.textContent = msg;
      errBox.classList.remove('show');
      // Force reflow so the shake animation replays each time
      void errBox.offsetWidth;
      errBox.classList.add('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.remove('show');
      const password = pwInput.value.trim();
      if (!password) {
        showError('Please enter the password.');
        return;
      }
      submitBtn.disabled = true;
      submitText.innerHTML = '<span class="spin"></span>Unlocking...';
      try {
        const res = await fetch('/dashboard-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.success) {
          submitText.textContent = 'Welcome back ✓';
          // Brief confirmation flash before redirect
          setTimeout(() => { window.location.href = '/'; }, 400);
        } else {
          const extra = (typeof data.attemptsLeft === 'number' && data.attemptsLeft > 0 && !data.locked)
            ? ` ${data.attemptsLeft} attempt${data.attemptsLeft === 1 ? '' : 's'} left.`
            : '';
          showError((data.error || 'Login failed.') + extra);
          submitBtn.disabled = false;
          submitText.textContent = 'Unlock dashboard';
          pwInput.value = '';
          pwInput.focus();
        }
      } catch (err) {
        showError('Could not reach the server. Please try again.');
        submitBtn.disabled = false;
        submitText.textContent = 'Unlock dashboard';
      }
    });
  </script>
</body>
</html>
